<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Attendance Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"></div>
                    <span>SIOS Portal</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-section="dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                    Dashboard
                </a>
                <a href="#" class="nav-item" data-section="attendance">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22v-7"/><path d="M9 18l3 3 3-3"/><path d="m5 10 7-7 7 7"/><path d="M12 3v14"/></svg>
                    Attendance
                </a>
                <a href="#" class="nav-item" data-section="students">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Students
                </a>
                <a href="#" class="nav-item" data-section="history">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
                    History
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-content">
                    <h1>Dashboard</h1>
                    <div class="user-profile">
                        <span>Welcome, Teacher</span>
                        <div class="avatar"></div>
                    </div>
                </div>
            </header>

            <div class="content-body">
                <!-- Dashboard Section -->
                <div id="dashboard" class="section active">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Total Students</div>
                            <div class="stat-value">42</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Present Today</div>
                            <div class="stat-value">38</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Absent Today</div>
                            <div class="stat-value">4</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Attendance %</div>
                            <div class="stat-value">90.5%</div>
                        </div>
                    </div>
                </div>

                <!-- Attendance Section (Hidden) -->
                <div id="attendance" class="section">
                    <h2>Mark Attendance</h2>
                    <p>Select section to load students...</p>
                </div>

                <!-- Students Section (Hidden) -->
                <div id="students" class="section">
                    <h2>Student Registry</h2>
                </div>

                <!-- History Section (Hidden) -->
                <div id="history" class="section">
                    <h2>Attendance History</h2>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
